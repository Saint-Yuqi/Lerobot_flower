# Diagnostic #2: identical to full_eval1_extra2_finetune_mgpu.yaml EXCEPT
# all train-only augmentation is OFF (image aug + prompt aug). This makes
# train and val photometrically/semantically symmetric (both clean), so it
# isolates whether the blue run's rising eval/loss was the train-only-aug
# asymmetry vs. genuine overfit/data. Short run (2000 steps ≈ 8 evals).
# Everything else (warm-start, lr 2e-5, bs256, cache, phase-sampling) is
# unchanged from the blue run so aug is the only changed variable.

experiment_name: eval1_flower_v1_extra2_finetune_noaug_mgpu_bs256_gc
seed: 42

data:
  repo_id: ethrl2026/so101_pickup_20260515_200119_task1_extra2
  revision: main
  root: null
  episodes: null
  video_key: observation.images.main
  frame_cache_dir: /home/yiyyan/.cache/flower_frames

  prompt_augmentation:
    enabled: false          # OFF (was on in blue) — symmetric train/val

  augmentations:
    enabled: false          # OFF (was on in blue) — symmetric train/val

  val:
    fraction: 0.1
    min_train_per_color: 3

model:
  init_from: ethrl2026/so101-eval1-flower-v1-aug-mgpu
  vlm_path: microsoft/Florence-2-base
  chunk_size: 50
  freeze_florence: true
  freeze_vision_tower: true
  use_proprio: false
  use_second_view: false
  image_hw: 224
  default_action_type: 3
  num_sampling_steps: 4
  dit_dim: 512
  n_heads: 16
  n_layers: 12

train:
  batch_size: 256
  grad_accum_steps: 1
  num_workers: 8
  prefetch_factor: 4
  num_steps: 2000           # short — only need ~8 evals to see the trend
  lr: 2.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 300
  max_grad_norm: 1.0
  log_every: 50
  save_every: 100000        # no intermediate ckpts for a diagnostic
  eval_every: 250
  output_dir: checkpoints/eval1_flower_v1_extra2_finetune_noaug_mgpu_bs256_gc
  device: cuda
  early_stop:
    enabled: false
  phase_sampling:
    enabled: true
    weight_pregrasp: 2.0
    open_frac: 0.6
    close_frac: 0.4
    min_amplitude: 5.0
    post_close_margin: 3

hf:
  push: false               # diagnostic — don't publish

logging:
  use_wandb: true
  project: Lerobot
  entity: yyyyorky-eth-z-rich
  mode: online
  tags: [diagnostic, extra2, finetune, warmstart, noaug, mgpu, bs256]
