# Multi-GPU FlowerVLA on task1_20260509_plus (765 ep / 309K frames).
# Carries forward the validated recipe: bs=256, grad clip 1.0, lr=7.5e-5,
# aug = color_jitter+sharpness+crop (no blur/noise), frame cache.
#
# Pull (already cached) + build cache first:
#   python scripts/build_frame_cache.py ethrl2026/task1_20260509_plus \
#     --revision main --cache-dir /home/yiyyan/.cache/flower_frames
# Launch:
#   accelerate launch --num_processes 4 --mixed_precision bf16 \
#     scripts/train_flower_accelerate.py --config configs/train/full_eval1_t1plus_aug_mgpu_bs256_gc.yaml

experiment_name: eval1_flower_v1_t1plus_aug_mgpu_bs256_gc
seed: 42

data:
  repo_id: ethrl2026/task1_20260509_plus
  revision: main
  root: null
  episodes: null
  video_key: observation.images.main
  frame_cache_dir: /home/yiyyan/.cache/flower_frames

  prompt_augmentation:
    enabled: true

  augmentations:
    enabled: true
    color_jitter:
      brightness: 0.2
      contrast: 0.2
      saturation: 0.2
    sharpness: 0.4
    random_crop_pct: 0.95
    # No gaussian blur/noise. 3 transforms; all 3 applied per frame.
    max_num_transforms: 3
    random_order: false

  val:
    fraction: 0.1
    min_train_per_color: 3

model:
  vlm_path: microsoft/Florence-2-base
  chunk_size: 50
  freeze_florence: true
  freeze_vision_tower: true
  use_proprio: false
  use_second_view: false
  image_hw: 224
  default_action_type: 3
  num_sampling_steps: 4
  dit_dim: 512
  n_heads: 16
  n_layers: 12

train:
  # GLOBAL batch — /4 ranks = 64 per-proc (~6 GB/GPU).
  batch_size: 256
  grad_accum_steps: 1
  num_workers: 8
  prefetch_factor: 4
  num_steps: 20000
  # sqrt-scaled for bs=256 (5e-5 baseline @ bs=128).
  lr: 7.5e-5
  weight_decay: 1.0e-5
  warmup_steps: 1500
  # Gradient clipping (global norm). Off when absent/0.
  max_grad_norm: 1.0
  log_every: 50
  save_every: 2000
  eval_every: 250
  output_dir: checkpoints/eval1_flower_v1_t1plus_aug_mgpu_bs256_gc
  device: cuda
  early_stop:
    enabled: true
    patience: 10
    min_delta: 0.005
    min_steps: 2500
  phase_sampling:
    enabled: true
    weight_pregrasp: 2.0
    open_frac: 0.6
    close_frac: 0.4
    min_amplitude: 5.0
    post_close_margin: 3

hf:
  push: true
  repo_id: "ethrl2026/so101-eval1-flower-v1-t1plus-aug-mgpu-bs256-gc"
  private: true

logging:
  use_wandb: true
  project: Lerobot
  entity: yyyyorky-eth-z-rich
  mode: online
  tags: [eval1, flowervla, task1-plus, prompt-aug, image-aug, mgpu, ddp, bs256, gradclip]
